name: Bartosz CI/CD pipeline

on:
    push:
      branches:
        - main
    pull_request:
    workflow_dispatch:
      inputs:
        reason:
          description: 'Reason for running'
          required: false
          default: 'Manual run'

jobs:
  run-the-tests:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    permissions:
      checks: write
      pull-requests: write

    steps:        
      - name: Checkout latest code from GitHub
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
            python-version: ${{ matrix.python-version }}

      - name: Show active Python version
        run: python --version

      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run tests
        run: pytest ./tests/account_tests.py

      - name: Make test results
        run: pytest ./tests/account_tests.py --junitxml=junit/test-results-${{matrix.python-version }}.xml

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: (always())
        with:
          files: test-results/**/*.xml
        